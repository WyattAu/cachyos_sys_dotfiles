# ownCloud Desktop Client — OCIS Sync Configuration
# ===================================================
# Server: ocis.wyattau.com
#
# This is the initial config template. After first login,
# the client will generate auth tokens here automatically.
#
# LAYOUT:
#   Sync root: ~/ocis/ (all spaces under one roof)
#   ~/ocis/Personal/     — Personal space (Books, etc.)
#   ~/ocis/QuestHive/    — QuestHive work space
#   ~/ocis/Deontic/      — Deontic work space
#   ~/ocis/pep/          — pep work space
#   ~/ocis/Shares/       — Shared files space
#
# CALIBRE:
#   ~/Library/Books → ~/ocis/Personal/Books (symlink)
#   Calibre reads the OCIS-synced library directly.
#
# SETUP:
#   1. Run: owncloudclient
#   2. Add account: ocis.wyattau.com
#   3. Configure sync folders (one per space, all under ~/ocis/)
#
# DO NOT manually edit the [Accounts] section — the client
# manages auth tokens and sync state automatically.

[General]
OptionConfirmExternalStorage=true
NumberOfSyncConnections=3
OptionalServerNotifications=true
SkipUpdateCheck=false
UpdateCheckInterval=86400
UpdateChannel=stable

[Accounts]
# Populated automatically on first login to ocis.wyattau.com
# Each account entry maps a local folder to a remote space.

# Performance and profiling limits (Ansible-managed)
# Raise fd limits for high-throughput networking and debugging
{% set u = user | default(ansible_facts.get('env', {}).get('SUDO_USER', ansible_facts.get('user_id', 'root'))) %}
@{{ u }}    soft    nofile    65536
@{{ u }}    hard    nofile    65536
@{{ u }}    soft    memlock   8388608
@{{ u }}    hard    memlock   8388608

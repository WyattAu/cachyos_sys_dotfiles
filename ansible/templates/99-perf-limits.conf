# Performance and profiling limits (Ansible-managed)
# Raise fd limits for high-throughput networking and debugging
@{{ user | default(ansible_user_id) }}    soft    nofile    65536
@{{ user | default(ansible_user_id) }}    hard    nofile    65536
@{{ user | default(ansible_user_id) }}    soft    memlock   8388608
@{{ user | default(ansible_user_id) }}    hard    memlock   8388608

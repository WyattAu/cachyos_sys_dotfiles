# =========================================================================
# Limine Kernel Parameters (Ansible-managed — DO NOT EDIT BY HAND)
# Drop-in for /etc/limine-entry-tool.d/
# Uses += syntax to APPEND to existing kernel command line.
# =========================================================================

{% if kernel_params is defined %}
{% for param in kernel_params %}
KERNEL_CMDLINE[default]+={{ param }}
{% endfor %}
{% endif %}

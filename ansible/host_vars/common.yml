# =========================================================================
# LAYER 1: BASE — Installed on ALL systems (WSL + Arch Native + CachyOS)
# =========================================================================

# --- CORE PACKAGES ---
common_packages:
  # Shell & Terminal
  - fish
  - kitty
  - alacritty
  - starship
  - neovim
  - direnv

  # CLI Essentials
  - base-devel
  - git
  - ansible
  - chezmoi
  - bat
  - eza
  - fzf
  - zoxide
  - ripgrep
  - btop
  - fastfetch
  - 7zip
  - unarchiver
  - wget
  - curl
  - man-db
  - lazygit
  - dunst
  - inetutils
  - keychain

  # Fonts
  - ttf-jetbrains-mono-nerd

  # Dev Toolchain
  - cmake
  - extra-cmake-modules
  - ninja
  - clang
  - gdb
  - doxygen
  - ccache
  - bun
  - pnpm
  - nodejs
  - gmp
  - libffi
  - rustup

  # Python
  - python-pip
  - python-setuptools

  # Performance & Profiling
  - perf
  - bpftrace
  - trace-cmd
  - msr-tools
  - cpupower

  # Docker
  - docker
  - docker-compose             # Docker Compose v2 (provides `docker compose` subcommand)

  # Flatpak
  - flatpak

  # Graphics (baseline — works everywhere including WSLg)
  - mesa
  - mesa-utils
  - vulkan-icd-loader
  - vulkan-swrast
  - libva
  - librewolf

# --- AUR PACKAGES (CLI only — safe on all platforms) ---
common_aur_pkgs:
  - github-desktop-bin
  - sublime-merge
  - localsend-bin
  - elan-bin
  - ghq                     # Repository manager

# --- DETERMINISTIC DIRECTORY STRUCTURE ---
dev_structure:
  - dev/src                 # GHQ root
  - dev/build               # Build artifacts
  - dev/sandbox             # Experiments / spikes
  - dev/scripts             # Personal scripts
  - dev/benchmarks          # Performance benchmarks
  - dev/docker              # Docker compose files (Portainer, OCIS, etc.)

personal_structure:
  # --- Documents ---
  - Documents/work          # Work / HFT related
  - Documents/notes         # Notes, markdown, obsidian
  - Documents/pdfs          # Papers, manuals, whitepapers
  - Documents/receipts      # Purchase records, invoices
  - Documents/contracts      # Legal, employment, NDAs

  # --- Media ---
  - Media/Movies            # Films
  - Media/TV                # TV series
  - Media/Anime             # Anime series
  - Media/Music             # Music library
  - Media/Audiobooks        # Audiobooks
  - Media/Podcasts          # Podcast downloads

  # --- Library (managed by Calibre + Zotero) ---
  - Library/Books           # Calibre library root
  - Library/Papers          # Zotero storage
  - Library/Audiobooks      # Calibre audiobooks

  # --- Games (launchers manage their own subdirs) ---
  - Games/Emulation         # ROMs, BIOS files
  - Games/Emulation/Saves   # Emulator save states
  - Games/Saves             # PC game save backups
  - Games/Mods              # Mod archives
  - Games/Screenshots        # In-game screenshots

  # --- System ---
  - downloads               # Browser / app downloads
  - screenshots             # Desktop screenshots
  - recordings              # Screen / audio recordings
  - inbox                   # Temporary landing zone

# --- GHQ ROOT ---
ghq_root: "~/dev/src"

# =========================================================================
# LAYER 1: BASE — Installed on ALL systems (WSL + Arch Native + CachyOS)
# =========================================================================

# --- CORE PACKAGES ---
common_packages:
  # Shell & Terminal
  - fish
  - kitty
  - alacritty
  - starship
  - neovim
  - direnv

  # CLI Essentials
  - base-devel
  - git
  - ansible
  - chezmoi
  - bat
  - eza
  - fzf
  - zoxide
  - ripgrep
  - btop
  - fastfetch
  - 7zip
  - unarchiver
  - wget
  - curl
  - man-db
  - lazygit
  - dunst
  - inetutils
  - keychain

  # Fonts
  - ttf-jetbrains-mono-nerd

  # Dev Toolchain
  - cmake
  - extra-cmake-modules
  - ninja
  - clang
  - gdb
  - doxygen
  - bun
  - pnpm
  - nodejs
  - gmp
  - libffi
  - rustup

  # Python
  - python-pip
  - python-setuptools

  # Graphics (baseline — works everywhere including WSLg)
  - mesa
  - mesa-utils
  - vulkan-icd-loader
  - vulkan-swrast
  - libva
  - librewolf

# --- AUR PACKAGES (CLI only — safe on all platforms) ---
common_aur_pkgs:
  - github-desktop-bin
  - sublime-merge
  - localsend-bin
  - elan-bin
  - ghq                     # Repository manager (was missing from package list)

# --- DETERMINISTIC DIRECTORY STRUCTURE ---
dev_structure:
  - dev/src                 # GHQ root
  - dev/build               # Build artifacts
  - dev/sandbox             # Experiments / spikes
  - dev/scripts             # Personal scripts

# --- GHQ ROOT ---
ghq_root: "~/dev/src"

# =========================================================================
# HOST: msi-z16 — MSI Creator Z16 Laptop
# =========================================================================
# Hardware: AMD Ryzen (scx-scheds), NVIDIA + iGPU hybrid, MSI EC
# Distro:   Vanilla Arch Linux
# Layers:   common.yml → arch_native.yml → arch_only.yml → THIS FILE

# --- Hardware Drivers & Peripherals ---
host_packages:
  - nvidia-open-dkms
  - nvidia-utils
  - nvidia-settings
  - libva-nvidia-driver
  - vulkan-tools
  - sof-firmware
  - alsa-tools
  - scx-scheds
  - libfprint
  - fprintd
  - python-hidapi
  - python-setuptools

host_aur_pkgs:
  - envycontrol
  - mcontrolcenter-git
  - msi-ec-dkms-git
  - scx-git
  - whitesur-icon-theme-git
  - moe-theme-git
  - openrgb-git
  - msi-perkeyrgb

# --- Services ---
host_services:
  - msi-audio.service
  - mcontrolcenter-helper.service
  - libvirtd

masked_services:
  - packagekit.service

# =========================================================================
# PERFORMANCE TUNING
# =========================================================================

# Laptop: 'ondemand' by default to save battery. Override per-scenario.
# Use 'performance' when plugged in via envycontrol or power profiles.
cpu_governor: "ondemand"

# --- Kernel Boot Parameters ---
# AMD Ryzen laptop — adjust C-state limits conservatively for battery
kernel_params:
  - "preempt=full"
  - "nmi_watchdog=0"
  - "nowatchdog"
  - "amdgpu.ppfeaturemask=0xffffffff"    # Unlock AMD power tuning
  - "ibt=off"                            # Disable Indirect Branch Tracking (perf)

# --- Sysctl Tuning ---
sysctl_tuning:
  vm:
    vm.swappiness: 30                      # Laptop — less aggressive than desktop
    vm.dirty_ratio: 20
    vm.dirty_background_ratio: 5
    vm.max_map_count: 262144
    vm.nr_hugepages: 256                   # 512MB — less on laptop
    vm.hugetlb_shm_group: 1000
  kernel:
    kernel.perf_event_paranoid: 0
    kernel.sched_autogroup_enabled: 0
    kernel.watchdog: 0
  net:
    net.core.busy_poll: 50
    net.core.busy_read: 50
    net.core.netdev_max_backlog: 16384
    net.core.rmem_max: 16777216
    net.core.wmem_max: 16777216
    net.core.rmem_default: 1048576
    net.core.wmem_default: 1048576
    net.core.optmem_max: 65536
    net.ipv4.tcp_low_latency: 1

# --- SCX Scheduler ---
scx_scheduler: "scx_lavd"

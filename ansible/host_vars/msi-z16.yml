# =========================================================================
# HOST: msi-z16 — MSI Creator Z16 Laptop
# =========================================================================
# Hardware: AMD Ryzen (scx-scheds), NVIDIA + iGPU hybrid, MSI EC
# Distro:   Vanilla Arch Linux
# Layers:   common.yml → arch_native.yml → arch_only.yml → THIS FILE

# --- Hardware Drivers & Peripherals ---
host_packages:
  - nvidia-open-dkms
  - nvidia-utils
  - nvidia-settings
  - libva-nvidia-driver
  - vulkan-tools
  - sof-firmware
  - alsa-tools
  - scx-scheds
  - libfprint
  - fprintd
  - python-hidapi
  - python-setuptools

host_aur_pkgs:
  - envycontrol
  - mcontrolcenter-git
  - msi-ec-dkms-git
  - whitesur-icon-theme-git
  - moe-theme-git
  - openrgb-git
  - msi-perkeyrgb

# --- Services ---
host_services:
  - msi-audio.service
  - mcontrolcenter-helper.service
  - libvirtd

masked_services:
  - packagekit.service

# =========================================================================
# PERFORMANCE TUNING
# =========================================================================

# CPU governor: managed by power-profiles-daemon (balanced by default).
# Use 'powerprofilesctl set performance' when plugged in.

# GPU: defaults to NVIDIA via envycontrol.
# After first sys-sync, run: envycontrol -s nvidia && reboot
# Switch to iGPU for battery: envycontrol -s integrated && reboot

# --- Kernel Boot Parameters ---
# Only hardware-specific params — no HFT-inspired tuning.
kernel_params:
  - "amdgpu.ppfeaturemask=0xffffffff"    # Unlock AMD power tuning
  - "ibt=off"                            # Disable Indirect Branch Tracking (perf)

# --- Sysctl Tuning ---
# Removed — Arch defaults are fine for laptop use.

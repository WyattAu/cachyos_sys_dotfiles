# =========================================================================
# HOST: wsl-dev — WSL2 Development Container
# =========================================================================
# WSL has no kernel control (Windows manages boot params, scheduler, etc.)
# Only user-space tuning and packages are relevant here.
# Layers: common.yml → THIS FILE (arch_native/arch_only/cachyos all skipped)

host_packages:
  - wl-clipboard            # Clipboard sync with Windows host
  - docker                  # Native Docker engine (faster than Docker Desktop)
  - docker-compose

host_aur_pkgs:
  - wslu                    # WSL utilities

host_services:
  - docker

masked_services: []

# --- No performance tuning for WSL ---
# kernel_params, sysctl_tuning, cpu_governor, scx_scheduler are all ignored
# because WSL has no control over the host kernel.

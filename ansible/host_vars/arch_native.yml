# =========================================================================
# LAYER 2: NATIVE LINUX — Installed on ALL bare-metal Linux (Arch + CachyOS)
# Nothing here should conflict with CachyOS repos or defaults.
# =========================================================================

# --- NATIVE SYSTEM PACKAGES ---
native_packages:
  # Desktop Environment
  - plasma-meta
  - dolphin
  - ark
  - gwenview
  - okular
  - spectacle

  # Browsers & Media Players
  - firefox
  - vlc
  - obs-studio
  - mpv
  - calibre

  # Productivity & Reference
  - libreoffice-fresh
  - hunspell
  - hunspell-en_US
  - rnote
  - zotero                  # Academic paper management

  # System Services & Networking (DO NOT RUN IN WSL)
  - networkmanager
  - network-manager-applet
  - networkmanager-openvpn
  - systemd-resolvconf
  - firewalld
  - wireguard-tools
  - openvpn
  - bluez
  - bluez-utils
  - cups
  - gnome-keyring            # Required by ProtonVPN for credential storage
  - proton-vpn-cli          # Official ProtonVPN CLI (core VPN control)
  - proton-vpn-daemon       # ProtonVPN system daemon (split tunneling service)

  # Sound
  - pipewire
  - pavucontrol
  - easyeffects
  - lsp-plugins
  - calf

  # Gaming
  - steam
  - lutris
  - heroic-games-launcher   # Epic + GOG in one app
  - gamemode
  - lib32-gamemode
  - mangohud
  - lib32-mangohud
  - gamescope
  - wine
  - winetricks
  - retroarch               # Unified emulation frontend

  # Tools
  - bleachbit
  - kdeconnect
  - filelight
  - gparted
  - element

  # Virtualization (KVM — unreliable inside WSL2)
  - qemu-full
  - virt-manager
  - virt-viewer
  - dnsmasq
  - vde2
  - openbsd-netcat
  - libguestfs

# --- NATIVE AUR PACKAGES (GUI / Heavy) ---
native_aur_pkgs:
  # KDE Integration
  - ksshaskpass

  # Browsers
  - floorp-bin
  - zen-browser-bin
  - tor-browser-bin

  # Chat
  - vesktop-bin
  - signal-desktop
  - whatsapp-for-linux
  - betterbird-bin

  # Media
  - freetube-bin

  # Gaming
  - protonup-qt
  - steam-rom-manager       # Manage ROMs for Steam

  # Sync & Safety
  - owncloud-client         # Desktop sync to OCIS (ocis.wyattau.com)
  - pika-backup
  - visual-studio-code-bin

  # VPN
  - proton-vpn-qt-app       # Qt GUI frontend for ProtonVPN CLI (KDE-native)

# --- NATIVE SERVICES (started on all bare-metal hosts) ---
native_services:
  - NetworkManager
  - firewalld
  - docker
  - fstrim.timer
  - irqbalance
  - bluetooth
  - cups

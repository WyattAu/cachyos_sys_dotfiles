# =========================================================================
# HOST: wyattdeskacercachy — Acer Desktop running CachyOS
# =========================================================================
# Hardware: Intel i5-9400F (6C/6T @ 4.1GHz), RTX 2060, NVMe
# Distro:   CachyOS (Layer 2c loaded automatically)
# Layers:   common.yml → arch_native.yml → cachyos.yml → THIS FILE

# --- Hardware Packages ---
host_packages: []
host_aur_pkgs: []

# --- Services ---
host_services:
  - libvirtd                # KVM virtualization

masked_services:
  - packagekit.service      # Conflicts with pacman

# =========================================================================
# PERFORMANCE TUNING
# =========================================================================

# CPU governor: managed by power-profiles-daemon (balanced by default).
# Use 'powerprofilesctl set performance' for temporary boost.
# Do NOT set cpu_governor — it conflicts with power-profiles-daemon.

# --- Kernel Boot Parameters (appended via Limine drop-in) ---
# Only mitigations=off — personal box, not internet-facing.
# CachyOS handles zram, scheduler, and power management well by default.
kernel_params:
  - "mitigations=off"

# --- Sysctl Tuning ---
# Removed — CachyOS defaults are optimal for zram-based desktop.
# Previously set swappiness=10 which defeated zram compression.
# power-profiles-daemon handles CPU governor dynamically.

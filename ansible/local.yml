---
# =========================================================================
# CACHYOS / ARCH MULTI-HOST PLAYBOOK
# =========================================================================
# Variable loading order (4-layer inheritance):
#   Layer 1: common.yml           — ALL systems (WSL + Native)
#   Layer 2: arch_native.yml      — All bare-metal Linux (Arch + CachyOS)
#   Layer 2b: arch_only.yml       — Vanilla Arch only (conflicts with CachyOS)
#   Layer 2c: cachyos.yml         — CachyOS only (optimized additions)
#   Layer 3: <hostname>.yml       — Device-specific overrides
# =========================================================================

- hosts: localhost
  connection: local
  become: true

  vars:
    user: "{{ lookup('env', 'USER') }}"

  tasks:
    # ================================================================
    # 1. ENVIRONMENT DETECTION
    # ================================================================
    - name: Detect WSL
      set_fact:
        is_wsl: "{{ 'microsoft' in (ansible_facts['kernel'] | default('')) }}"

    - name: Detect CachyOS
      ansible.builtin.shell: . /etc/os-release && echo "$ID"
      register: os_id
      changed_when: false

    - name: Set distro facts
      set_fact:
        is_cachyos: "{{ 'cachyos' in os_id.stdout }}"

    - name: Display environment
      debug:
        msg: >-
          Host={{ ansible_facts['hostname'] }}
          WSL={{ is_wsl }}
          CachyOS={{ is_cachyos }}
          Kernel={{ ansible_facts['kernel'] }}

    # ================================================================
    # 2. LOAD VARIABLES (4-layer inheritance)
    # ================================================================
    - name: "Layer 1: Load common variables (all systems)"
      include_vars:
        file: host_vars/common.yml

    - name: "Layer 2: Load native Linux variables (skip WSL)"
      include_vars:
        file: host_vars/arch_native.yml
      when: not is_wsl

    - name: "Layer 2b: Load Arch-only variables (skip CachyOS and WSL)"
      include_vars:
        file: host_vars/arch_only.yml
      when:
        - not is_cachyos
        - not is_wsl

    - name: "Layer 2c: Load CachyOS-specific variables"
      include_vars:
        file: host_vars/cachyos.yml
      when:
        - is_cachyos
        - not is_wsl

    - name: "Layer 3: Load host-specific overrides"
      include_vars:
        file: "host_vars/{{ ansible_facts['hostname'] }}.yml"
      failed_when: false

    # ================================================================
    # 3. AUTOMATION & MAINTENANCE (native only)
    # ================================================================
    - name: Create Auto-Update Service
      copy:
        dest: /etc/systemd/system/auto-sys-sync.service
        content: |
          [Unit]
          Description=Background System Sync
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          User={{ user }}
          ExecStart=/usr/bin/bash -c "/home/{{ user }}/.local/bin/sys-sync"
      when: not is_wsl

    - name: Create Auto-Update Timer
      copy:
        dest: /etc/systemd/system/auto-sys-sync.timer
        content: |
          [Unit]
          Description=Run sys-sync 15min after boot and daily
          [Timer]
          OnBootSec=15min
          OnUnitActiveSec=1d
          Persistent=true
          [Install]
          WantedBy=timers.target
      when: not is_wsl

    - name: Enable Auto-Update Timer
      systemd:
        name: auto-sys-sync.timer
        enabled: yes
        state: started
      when: not is_wsl

    # ================================================================
    # 4. PRIVILEGE & SYSTEM UPDATES
    # ================================================================
    - name: Allow 'pacman' to run without password
      lineinfile:
        path: /etc/sudoers.d/11-ansible-pacman
        line: "{{ user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Update System Repos
      community.general.pacman:
        update_cache: yes
        upgrade: yes

    - name: Upgrade AUR Packages
      kewlfft.aur.aur:
        upgrade: yes
        use: paru
        aur_only: yes
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 5. PACKAGE INSTALLATION (merged from all layers)
    # ================================================================
    - name: Install System Packages
      community.general.pacman:
        name: >-
          {{ common_packages
           + (native_packages | default([]))
           + (arch_only_packages | default([]))
           + (cachyos_packages | default([]))
           + (host_packages | default([])) }}
        state: present

    - name: Install AUR Packages
      kewlfft.aur.aur:
        name: >-
          {{ common_aur_pkgs
           + (native_aur_pkgs | default([]))
           + (arch_only_aur_pkgs | default([]))
           + (cachyos_aur_pkgs | default([]))
           + (host_aur_pkgs | default([])) }}
        use: paru
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 6. MANAGEMENT SCRIPTS
    # ================================================================
    - name: Ensure management scripts are executable
      file:
        path: "/home/{{ user }}/.local/share/chezmoi/scripts/{{ item }}"
        mode: "0755"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop:
        - sys-save
        - sys-sync
        - bootstrap.sh

    # ================================================================
    # 7. TOOLCHAINS (installed as the actual user, NOT root)
    # ================================================================
    - name: Initialize Global Rust Toolchain
      command: rustup default stable
      args:
        creates: "/home/{{ user }}/.cargo/bin/cargo"
      become: true
      become_user: "{{ user }}"

    - name: Initialize Elan (Lean 4)
      shell: "curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y"
      args:
        creates: "/home/{{ user }}/.elan/bin/lean"
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 8. DETERMINISTIC DIRECTORY MANAGEMENT
    # ================================================================
    - name: Ensure Dev Directory Structure Exists
      file:
        path: "/home/{{ user }}/{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop: "{{ dev_structure | default([]) }}"

    - name: Configure GHQ Root Directory in Git
      git_config:
        name: ghq.root
        scope: global
        value: "{{ ghq_root | default('~/dev/src') }}"
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 9. HOST-SPECIFIC HARDWARE FIXES
    # NOTE: Runs BEFORE service enablement so unit files exist.
    # ================================================================

    # --- MSI Z16: Audio fix, service unit creation ---
    - block:
        - name: Create MSI Audio Fix Script
          copy:
            dest: /usr/local/bin/msi-audio-fix.sh
            mode: "0755"
            content: |
              #!/bin/bash
              hda-verb /dev/snd/hwC0D0 0x17 SET_CONNECT_SEL 0x01
              hda-verb /dev/snd/hwC0D0 0x17 SET_PIN_WIDGET_CONTROL 0x40
              hda-verb /dev/snd/hwC0D0 0x1a SET_AMP_GAIN_MUTE 0xb000
              hda-verb /dev/snd/hwC0D0 0x1a SET_PIN_WIDGET_CONTROL 0x40

        - name: Create MSI Audio systemd Unit
          copy:
            dest: /etc/systemd/system/msi-audio.service
            content: |
              [Unit]
              Description=Fix MSI Woofers
              After=sound.target
              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/msi-audio-fix.sh
              [Install]
              WantedBy=multi-user.target

        - name: Reload systemd for new MSI units
          systemd:
            daemon_reload: yes
      when: ansible_facts['hostname'] == "msi-z16"

    # ================================================================
    # 10. NATIVE SYSTEM CONFIGURATION (groups, services, audio)
    # ================================================================
    - block:
        - name: Ensure User Groups Exist
          group:
            name: "{{ item }}"
            state: present
          loop: [docker, libvirt, gamemode, input, video]

        - name: Add User to Groups
          user:
            name: "{{ user }}"
            groups: docker,libvirt,gamemode,input,video
            append: yes

        - name: Enable Native Services (Layer 2)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ native_services | default([]) }}"
          ignore_errors: yes

        - name: Enable Arch-Only Services (Layer 2b)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ arch_only_services | default([]) }}"
          ignore_errors: yes

        - name: Enable CachyOS Services (Layer 2c)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ cachyos_services | default([]) }}"
          ignore_errors: yes

        - name: Enable Host-Specific Services (Layer 3)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
            daemon_reload: yes
          loop: "{{ host_services | default([]) }}"
          ignore_errors: yes

        - name: Mask Unwanted Services
          systemd:
            name: "{{ item }}"
            masked: yes
          loop: "{{ masked_services | default([]) }}"

        - name: Optimize PipeWire for High-End Audio
          copy:
            dest: /etc/pipewire/pipewire.conf.d/99-custom-audio.conf
            content: |
              context.properties = {
              # Force high-quality resampling
              default.clock.rate = 48000
              default.clock.allowed-rates = [ 44100, 48000, 88200, 96000 ]
              # Increase buffer size to prevent distortion/crackling
              default.clock.min-quantum = 1024
              default.clock.max-quantum = 2048
              }
      when: not is_wsl

    # ================================================================
    # 11. PERFORMANCE TUNING: SYSCTL (native only)
    # ================================================================
    - name: Deploy sysctl tuning
      ansible.builtin.template:
        src: templates/99-hft-tuning.conf.j2
        dest: /etc/sysctl.d/99-hft-tuning.conf
        mode: "0644"
      when:
        - not is_wsl
        - sysctl_tuning is defined
      notify: Reload sysctl

    # ================================================================
    # 12. PERFORMANCE TUNING: CPU GOVERNOR (native only)
    # ================================================================
    - name: Configure CPU power governor
      ansible.builtin.template:
        src: templates/cpupower.conf.j2
        dest: /etc/default/cpupower-service.conf
        mode: "0644"
      when:
        - not is_wsl
        - cpu_governor is defined

    - name: Enable cpupower service
      systemd:
        name: cpupower
        enabled: yes
        state: started
        daemon_reload: yes
      when:
        - not is_wsl
        - cpu_governor is defined
      ignore_errors: yes

    # ================================================================
    # 13. PERFORMANCE TUNING: SCX SCHEDULER (native only)
    # ================================================================
    - block:
        - name: Ensure SCX override directory exists
          file:
            path: /etc/systemd/system/scx.service.d
            state: directory
            mode: "0755"

        - name: Create SCX scheduler override
          copy:
            dest: /etc/systemd/system/scx.service.d/override.conf
            content: |
              [Service]
              ExecStart=
              ExecStart=/usr/bin/scx_{{ scx_scheduler | default('lavd') }}
              Restart=on-failure
              RestartSec=5
            mode: "0644"
          when: scx_scheduler is defined

        - name: Enable SCX scheduler
          systemd:
            name: scx
            enabled: yes
            daemon_reload: yes
          when: scx_scheduler is defined
          ignore_errors: yes
      when: not is_wsl

    # ================================================================
    # 14. PERFORMANCE TUNING: NVMe I/O SCHEDULER (native only)
    # ================================================================
    - name: Install NVMe udev scheduler rule
      copy:
        src: templates/60-nvme-scheduler.rules
        dest: /etc/udev/rules.d/60-nvme-scheduler.rules
        mode: "0644"
      when: not is_wsl
      notify: Reload udev

    # ================================================================
    # 15. PERFORMANCE TUNING: KERNEL BOOT PARAMETERS (native only)
    # Uses Limine's drop-in system: /etc/limine-entry-tool.d/*.conf
    # After deployment, run: sudo limine-update (rebuilds limine.conf)
    # ================================================================
    - name: Deploy kernel parameter drop-in
      ansible.builtin.template:
        src: templates/99-hft-kernel.conf
        dest: /etc/limine-entry-tool.d/99-hft-kernel.conf
        mode: "0644"
      when:
        - not is_wsl
        - kernel_params is defined

    - name: Notify user to update bootloader
      debug:
        msg: >-
          WARNING: Kernel parameters changed.
          Run 'sudo limine-update' then reboot for boot params to take effect.
      when:
        - not is_wsl
        - kernel_params is defined

    # ================================================================
    # 16. PERFORMANCE TUNING: HUGE PAGES (native only)
    # ================================================================
    - name: Configure huge pages via sysctl
      ansible.builtin.sysctl:
        name: vm.nr_hugepages
        value: "{{ (sysctl_tuning.vm['vm.nr_hugepages'] | default(0)) | string }}"
        sysctl_set: yes
        sysctl_file: /etc/sysctl.d/99-hft-tuning.conf
      when:
        - not is_wsl
        - sysctl_tuning is defined
        - sysctl_tuning.vm is defined
        - sysctl_tuning.vm['vm.nr_hugepages'] is defined
        - sysctl_tuning.vm['vm.nr_hugepages'] > 0
      ignore_errors: yes

    # ================================================================
    # 17. PERFORMANCE TUNING: SECURITY LIMITS (native only)
    # ================================================================
    - block:
        - name: Set performance event paranoid for profiling
          ansible.builtin.sysctl:
            name: kernel.perf_event_paranoid
            value: "{{ (sysctl_tuning.kernel['kernel.perf_event_paranoid'] | default(1)) | string }}"
            sysctl_set: yes
            sysctl_file: /etc/sysctl.d/99-hft-tuning.conf
          when: sysctl_tuning is defined and sysctl_tuning.kernel is defined
          ignore_errors: yes

        - name: Set file descriptor limits
          ansible.builtin.template:
            src: templates/99-perf-limits.conf
            dest: /etc/security/limits.d/99-perf-limits.conf
            mode: "0644"
      when: not is_wsl

  # ================================================================
  # HANDLERS
  # ================================================================
  handlers:
    - name: Reload sysctl
      ansible.builtin.shell: sysctl --system
      changed_when: false

    - name: Reload udev
      ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
      changed_when: false

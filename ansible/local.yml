---
# =========================================================================
# CACHYOS / ARCH MULTI-HOST PLAYBOOK
# =========================================================================
# Variable loading order (4-layer inheritance):
#   Layer 1: common.yml           — ALL systems (WSL + Native)
#   Layer 2: arch_native.yml      — All bare-metal Linux (Arch + CachyOS)
#   Layer 2b: arch_only.yml       — Vanilla Arch only (conflicts with CachyOS)
#   Layer 2c: cachyos.yml         — CachyOS only (optimized additions)
#   Layer 3: <hostname>.yml       — Device-specific overrides
# =========================================================================

- hosts: localhost
  connection: local
  become: true

  vars:
    user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"

  tasks:
    # ================================================================
    # 1. ENVIRONMENT DETECTION
    # ================================================================
    - name: Detect WSL
      set_fact:
        is_wsl: "{{ 'microsoft' in (ansible_facts['kernel'] | default('')) }}"

    - name: Detect CachyOS
      ansible.builtin.shell: . /etc/os-release && echo "$ID"
      register: os_id
      changed_when: false

    - name: Set distro facts
      set_fact:
        is_cachyos: "{{ 'cachyos' in os_id.stdout }}"

    - name: Display environment
      debug:
        msg: >-
          Host={{ ansible_facts['hostname'] }}
          WSL={{ is_wsl }}
          CachyOS={{ is_cachyos }}
          Kernel={{ ansible_facts['kernel'] }}

    # ================================================================
    # 2. LOAD VARIABLES (4-layer inheritance)
    # ================================================================
    - name: "Layer 1: Load common variables (all systems)"
      include_vars:
        file: host_vars/common.yml

    - name: "Layer 2: Load native Linux variables (skip WSL)"
      include_vars:
        file: host_vars/arch_native.yml
      when: not is_wsl

    - name: "Layer 2b: Load Arch-only variables (skip CachyOS and WSL)"
      include_vars:
        file: host_vars/arch_only.yml
      when:
        - not is_cachyos
        - not is_wsl

    - name: "Layer 2c: Load CachyOS-specific variables"
      include_vars:
        file: host_vars/cachyos.yml
      when:
        - is_cachyos
        - not is_wsl

    - name: "Layer 3: Load host-specific overrides"
      include_vars:
        file: "host_vars/{{ ansible_facts['hostname'] }}.yml"
      failed_when: false

    # ================================================================
    # 3. AUTOMATION & MAINTENANCE (native only)
    # ================================================================
    - name: Create Auto-Update Service
      copy:
        dest: /etc/systemd/system/auto-sys-sync.service
        content: |
          [Unit]
          Description=Background System Sync
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          User={{ user }}
          ExecStart=/usr/bin/bash -c "/home/{{ user }}/.local/share/chezmoi/scripts/sys-sync"
      when: not is_wsl

    - name: Create Auto-Update Timer
      copy:
        dest: /etc/systemd/system/auto-sys-sync.timer
        content: |
          [Unit]
          Description=Run sys-sync 15min after boot and daily
          [Timer]
          OnBootSec=15min
          OnUnitActiveSec=1d
          Persistent=true
          [Install]
          WantedBy=timers.target
      when: not is_wsl

    - name: Enable Auto-Update Timer
      systemd:
        name: auto-sys-sync.timer
        enabled: yes
        state: started
      when: not is_wsl

    # ================================================================
    # 4. PRIVILEGE & SYSTEM UPDATES
    # ================================================================
    - name: Allow 'pacman' to run without password
      lineinfile:
        path: /etc/sudoers.d/11-ansible-pacman
        line: "{{ user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Update System Repos
      community.general.pacman:
        update_cache: yes
        upgrade: yes

    - name: Upgrade AUR Packages
      kewlfft.aur.aur:
        upgrade: yes
        use: paru
        aur_only: yes
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 5. PACKAGE INSTALLATION (merged from all layers)
    # ================================================================
    - name: Remove AUR packages superseded by native repos
      community.general.pacman:
        name:
          - heroic-games-launcher-bin
        state: absent
      ignore_errors: true

    - name: Install System Packages
      community.general.pacman:
        name: >-
          {{ common_packages
           + (native_packages | default([]))
           + (arch_only_packages | default([]))
           + (cachyos_packages | default([]))
           + (host_packages | default([])) }}
        state: present

    - name: Create temporary swap file for AUR builds
      ansible.builtin.shell:
        cmd: |
          if [ ! -f /tmp/aur_build_swap ]; then
            fallocate -l 4G /tmp/aur_build_swap
            chmod 600 /tmp/aur_build_swap
            mkswap /tmp/aur_build_swap
            swapon /tmp/aur_build_swap
            echo "Swap created"
          else
            echo "Swap already exists"
          fi
      changed_when: false

    - name: Install AUR Packages
      kewlfft.aur.aur:
        name: >-
          {{ common_aur_pkgs
           + (native_aur_pkgs | default([]))
           + (arch_only_aur_pkgs | default([]))
           + (cachyos_aur_pkgs | default([]))
           + (host_aur_pkgs | default([])) }}
        use: paru
        extra_args: --builddir /tmp/aur_build --makepkgconf '-j1'
      become: true
      become_user: "{{ user }}"

    - name: Remove temporary swap file
      ansible.builtin.shell:
        cmd: |
          if [ -f /tmp/aur_build_swap ]; then
            swapoff /tmp/aur_build_swap
            rm -f /tmp/aur_build_swap
            echo "Swap removed"
          fi
      changed_when: false

    - name: Ensure Flathub remote is configured
      ansible.builtin.shell: >
        flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      changed_when: false

    # ================================================================
    # 6. MANAGEMENT SCRIPTS
    # ================================================================
    - name: Ensure management scripts are executable
      file:
        path: "/home/{{ user }}/.local/share/chezmoi/scripts/{{ item }}"
        mode: "0755"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop:
        - sys-save
        - sys-sync
        - bootstrap.sh

    # ================================================================
    # 7. TOOLCHAINS (installed as the actual user, NOT root)
    # ================================================================
    - name: Initialize Nix (multi-user install)
      # Uses the official Determinate Systems installer — idempotent.
      # Installs Nix daemon, creates /nix/store, adds nix-daemon service.
      # Runs as root; after install, user is configured via nix.conf.
      shell: >
        curl -L https://nixos.org/nix/install 2>/dev/null |
        sh -s -- --daemon --yes
      args:
        creates: "/nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh"
      when: not is_wsl

    - name: Configure Nix trusted-users
      copy:
        dest: /etc/nix/nix.conf
        content: |
          # Ansible-managed Nix configuration
          experimental-features = nix-command flakes
          trusted-users = root {{ user }}
        mode: "0644"
        owner: root
        group: root
      when: not is_wsl
      notify: Restart nix-daemon

    - name: Enable nix-daemon service
      systemd:
        name: nix-daemon
        enabled: yes
        state: started
        daemon_reload: yes
      when: not is_wsl
      ignore_errors: yes

    - name: Initialize Global Rust Toolchain
      command: rustup default stable
      args:
        creates: "/home/{{ user }}/.cargo/bin/cargo"
      become: true
      become_user: "{{ user }}"

    - name: Initialize Elan (Lean 4)
      shell: "curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y"
      args:
        creates: "/home/{{ user }}/.elan/bin/lean"
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 8. DETERMINISTIC DIRECTORY MANAGEMENT
    # ================================================================
    - name: Ensure Dev Directory Structure Exists
      file:
        path: "/home/{{ user }}/{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop: "{{ dev_structure | default([]) }}"

    - name: Ensure Personal Directory Structure Exists
      file:
        path: "/home/{{ user }}/{{ item }}"
        state: directory
        mode: "0755"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop: "{{ personal_structure | default([]) }}"

    - name: Create SSH directories
      file:
        path: "/home/{{ user }}/{{ item }}"
        state: directory
        mode: "0700"
        owner: "{{ user }}"
        group: "{{ user }}"
      loop: "{{ ssh_structure | default([]) }}"

    - name: Create Steam Symlink (Games/Steam -> ~/.local/share/Steam)
      file:
        src: "/home/{{ user }}/.local/share/Steam"
        dest: "/home/{{ user }}/Games/Steam"
        state: link
        owner: "{{ user }}"
        force: false

    - name: Configure GHQ Root Directory in Git
      git_config:
        name: ghq.root
        scope: global
        value: "{{ ghq_root | default('~/dev/src') }}"
      become: true
      become_user: "{{ user }}"

    # ================================================================
    # 9. HOST-SPECIFIC HARDWARE FIXES
    # NOTE: Runs BEFORE service enablement so unit files exist.
    # ================================================================

    # --- MSI Z16: Audio fix, service unit creation ---
    - block:
        - name: Create MSI Audio Fix Script
          copy:
            dest: /usr/local/bin/msi-audio-fix.sh
            mode: "0755"
            content: |
              #!/bin/bash
              hda-verb /dev/snd/hwC0D0 0x17 SET_CONNECT_SEL 0x01
              hda-verb /dev/snd/hwC0D0 0x17 SET_PIN_WIDGET_CONTROL 0x40
              hda-verb /dev/snd/hwC0D0 0x1a SET_AMP_GAIN_MUTE 0xb000
              hda-verb /dev/snd/hwC0D0 0x1a SET_PIN_WIDGET_CONTROL 0x40

        - name: Create MSI Audio systemd Unit
          copy:
            dest: /etc/systemd/system/msi-audio.service
            content: |
              [Unit]
              Description=Fix MSI Woofers
              After=sound.target
              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/msi-audio-fix.sh
              [Install]
              WantedBy=multi-user.target

        - name: Reload systemd for new MSI units
          systemd:
            daemon_reload: yes
      when: ansible_facts['hostname'] == "msi-z16"

    # ================================================================
    # 10. NATIVE SYSTEM CONFIGURATION (groups, services, audio)
    # ================================================================
    - block:
        - name: Ensure User Groups Exist
          group:
            name: "{{ item }}"
            state: present
          loop: [docker, libvirt, gamemode, input, video]

        - name: Add User to Groups
          user:
            name: "{{ user }}"
            groups: docker,libvirt,gamemode,input,video
            append: yes

        - name: Enable Common Services (Layer 1)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ common_services | default([]) }}"
          ignore_errors: yes

        - name: Enable Native Services (Layer 2)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ native_services | default([]) }}"
          ignore_errors: yes

        - name: Enable Arch-Only Services (Layer 2b)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ arch_only_services | default([]) }}"
          ignore_errors: yes

        - name: Enable CachyOS Services (Layer 2c)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: "{{ cachyos_services | default([]) }}"
          ignore_errors: yes

        - name: Enable Host-Specific Services (Layer 3)
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
            daemon_reload: yes
          loop: "{{ host_services | default([]) }}"
          ignore_errors: yes

        - name: Mask Unwanted Services
          systemd:
            name: "{{ item }}"
            masked: yes
          loop: "{{ masked_services | default([]) }}"

        - name: Optimize PipeWire for High-End Audio
          copy:
            dest: /etc/pipewire/pipewire.conf.d/99-custom-audio.conf
            content: |
              context.properties = {
              # Force high-quality resampling
              default.clock.rate = 48000
              default.clock.allowed-rates = [ 44100, 48000, 88200, 96000 ]
              # Increase buffer size to prevent distortion/crackling
              default.clock.min-quantum = 1024
              default.clock.max-quantum = 2048
              }
      when: not is_wsl

    # ================================================================
    # 10b. CONTAINER INFRASTRUCTURE (native only)
    # ================================================================
    - block:
        - name: Create Docker compose directory
          file:
            path: "/home/{{ user }}/dev/docker"
            state: directory
            mode: "0755"
            owner: "{{ user }}"
            group: "{{ user }}"

        - name: Deploy Portainer compose file
          copy:
            src: files/portainer-compose.yml
            dest: "/home/{{ user }}/dev/docker/portainer-compose.yml"
            mode: "0644"
            owner: "{{ user }}"
            group: "{{ user }}"

        - name: Start Portainer
          community.docker.docker_compose_v2:
            project_src: "/home/{{ user }}/dev/docker"
            files:
              - portainer-compose.yml
            pull: always
          become: true
          become_user: "{{ user }}"
          ignore_errors: yes
      when: not is_wsl

    # ================================================================
    # 11. PERFORMANCE TUNING: SYSCTL (native only)
    # ================================================================
    # Always deploy to ensure old overrides are cleared when removed from host_vars.
    - name: Deploy sysctl tuning
      ansible.builtin.template:
        src: templates/99-hft-tuning.conf.j2
        dest: /etc/sysctl.d/99-hft-tuning.conf
        mode: "0644"
      when: not is_wsl
      notify: Reload sysctl

    # ================================================================
    # 12. CPU GOVERNOR: managed by power-profiles-daemon
    # ================================================================
    # cpupower conflicts with power-profiles-daemon. Remove our override
    # so power-profiles-daemon (balanced/performance/power-saver) controls it.
    - name: Remove cpupower governor override (managed by power-profiles-daemon)
      ansible.builtin.file:
        path: /etc/default/cpupower-service.conf
        state: absent
      when:
        - not is_wsl
        - cpu_governor is not defined

    - name: Configure CPU power governor (legacy, if explicitly set)
      ansible.builtin.template:
        src: templates/cpupower.conf.j2
        dest: /etc/default/cpupower-service.conf
        mode: "0644"
      when:
        - not is_wsl
        - cpu_governor is defined

    - name: Enable cpupower service
      systemd:
        name: cpupower
        enabled: yes
        state: started
        daemon_reload: yes
      when:
        - not is_wsl
        - cpu_governor is defined
      ignore_errors: yes

    # ================================================================
    # 13. PERFORMANCE TUNING: SCX SCHEDULER (native only)
    # ================================================================
    # scx-scheds provides 'scx_loader.service' — a D-Bus on-demand loader.
    # Override to launch with --auto for automatic scheduler selection.
    - block:
        - name: Clean up stale scx.service.d override (if exists)
          file:
            path: /etc/systemd/system/scx.service.d
            state: absent

        - name: Ensure SCX loader override directory exists
          file:
            path: /etc/systemd/system/scx_loader.service.d
            state: directory
            mode: "0755"

        - name: Create SCX loader override
          copy:
            dest: /etc/systemd/system/scx_loader.service.d/override.conf
            content: |
              [Service]
              ExecStart=
              ExecStart=/usr/bin/scx_loader --auto
            mode: "0644"

        - name: Enable SCX scheduler loader
          systemd:
            name: scx_loader
            enabled: yes
            daemon_reload: yes
            # state: started NOT used — scx_loader is Type=dbus (on-demand),
            # systemctl start would hang waiting for the bus name.
      when: not is_wsl

    # ================================================================
    # 14. PERFORMANCE TUNING: NVMe I/O SCHEDULER (native only)
    # ================================================================
    - name: Install NVMe udev scheduler rule
      copy:
        src: templates/60-nvme-scheduler.rules
        dest: /etc/udev/rules.d/60-nvme-scheduler.rules
        mode: "0644"
      when: not is_wsl
      notify: Reload udev

    # ================================================================
    # 15. PERFORMANCE TUNING: KERNEL BOOT PARAMETERS (native only)
    # CachyOS uses Limine (drop-in at /etc/limine-entry-tool.d/)
    # Vanilla Arch uses GRUB (/etc/default/grub)
    # ================================================================

    # --- CachyOS: Limine drop-in ---
    - name: Deploy kernel parameter drop-in (Limine / CachyOS)
      ansible.builtin.template:
        src: templates/99-hft-kernel.conf
        dest: /etc/limine-entry-tool.d/99-hft-kernel.conf
        mode: "0644"
      when:
        - not is_wsl
        - is_cachyos

    - name: Rebuild Limine boot config
      ansible.builtin.command: limine-update
      when:
        - not is_wsl
        - is_cachyos
        - kernel_params is defined
      changed_when: false

    # --- Vanilla Arch: GRUB default cmdline ---
    # Idempotent: strips any existing instances of our params before re-appending.
    # Safe to run on every sys-sync without doubling params.
    - name: Ensure kernel parameters in GRUB config (Arch, idempotent)
      ansible.builtin.shell: |
        CURRENT=$(grep -oP '^GRUB_CMDLINE_LINUX_DEFAULT="\K[^"]+' /etc/default/grub 2>/dev/null || echo "")
        # Remove any of our params that are already present (match by key before =)
        for PARAM in {{ kernel_params | join(' ') }}; do
          KEY="${PARAM%%=*}"
          CURRENT=$(echo "$CURRENT" | sed "s/${KEY}=[^ ]*//g")
        done
        # Trim whitespace, append our params, trim again
        CURRENT=$(echo "$CURRENT" | xargs)
        FINAL="${CURRENT} {{ kernel_params | join(' ') }}"
        FINAL=$(echo "$FINAL" | xargs)
        # Only write if different (idempotent)
        EXISTING=$(grep -oP '^GRUB_CMDLINE_LINUX_DEFAULT="\K[^"]+' /etc/default/grub 2>/dev/null || echo "")
        if [ "$FINAL" != "$EXISTING" ]; then
          sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${FINAL}\"|" /etc/default/grub
          echo "CHANGED"
        fi
      register: grub_updated
      changed_when: "'CHANGED' in grub_updated.stdout"
      when:
        - not is_wsl
        - not is_cachyos
        - kernel_params is defined

    - name: Rebuild GRUB config
      ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
      when:
        - not is_wsl
        - not is_cachyos
        - kernel_params is defined
        - grub_updated is changed
      changed_when: false

    # ================================================================
    # 16. PERFORMANCE TUNING: HUGE PAGES (native only)
    # ================================================================
    - name: Configure huge pages via sysctl
      ansible.builtin.sysctl:
        name: vm.nr_hugepages
        value: "{{ (sysctl_tuning.vm['vm.nr_hugepages'] | default(0)) | string }}"
        sysctl_set: yes
        sysctl_file: /etc/sysctl.d/99-hft-tuning.conf
      when:
        - not is_wsl
        - sysctl_tuning is defined
        - sysctl_tuning.vm is defined
        - sysctl_tuning.vm['vm.nr_hugepages'] is defined
        - sysctl_tuning.vm['vm.nr_hugepages'] > 0
      ignore_errors: yes

    # Clear huge pages when not explicitly configured (frees reserved RAM)
    - name: Clear huge pages reservation
      ansible.builtin.sysctl:
        name: vm.nr_hugepages
        value: "0"
        sysctl_set: yes
        sysctl_file: /etc/sysctl.d/99-hft-tuning.conf
      when:
        - not is_wsl
        - sysctl_tuning is not defined
      ignore_errors: yes

    # ================================================================
    # 17. PERFORMANCE TUNING: SECURITY LIMITS (native only)
    # ================================================================
    - block:
        - name: Set performance event paranoid for profiling
          ansible.builtin.sysctl:
            name: kernel.perf_event_paranoid
            value: "{{ (sysctl_tuning.kernel['kernel.perf_event_paranoid'] | default(1)) | string }}"
            sysctl_set: yes
            sysctl_file: /etc/sysctl.d/99-hft-tuning.conf
          when: sysctl_tuning is defined and sysctl_tuning.kernel is defined
          ignore_errors: yes

        - name: Set file descriptor limits
          ansible.builtin.template:
            src: templates/99-perf-limits.conf
            dest: /etc/security/limits.d/99-perf-limits.conf
            mode: "0644"
      when: not is_wsl

  # ================================================================
  # HANDLERS
  # ================================================================
  handlers:
    - name: Reload sysctl
      ansible.builtin.shell: sysctl --system
      changed_when: false

    - name: Reload udev
      ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
      changed_when: false

    - name: Restart nix-daemon
      ansible.builtin.systemd:
        name: nix-daemon
        state: restarted

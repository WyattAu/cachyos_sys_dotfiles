---
- hosts: localhost
  connection: local
  become: true # Global sudo session

  vars:
    user: "{{ lookup('env', 'USER') }}"

  tasks:
    # --- 1. LOAD MODULAR VARIABLES ---
    - name: Load All Variables
      include_vars: "{{ item }}"
      loop:
        - host_vars/common.yml
        - host_vars/arch_native.yml
      ignore_errors: yes

    - name: Load Host-Specific Overrides
      include_vars:
        file: "host_vars/{{ ansible_facts['hostname'] }}.yml"
      failed_when: false
      ignore_errors: yes

    # --- 2. AUTOMATION & MAINTENANCE ---
    - name: Create Auto-Update Service
      copy:
        dest: /etc/systemd/system/auto-sys-sync.service
        content: |
          [Unit]
          Description=Background System Sync
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          User={{ user }}
          ExecStart=/usr/bin/bash -c "/home/{{ user }}/.local/bin/sys-sync"
      when: ansible_facts['hostname'] != "wsl-dev"

    - name: Create Auto-Update Timer
      copy:
        dest: /etc/systemd/system/auto-sys-sync.timer
        content: |
          [Unit]
          Description=Run sys-sync 15min after boot and daily
          [Timer]
          OnBootSec=15min
          OnUnitActiveSec=1d
          Persistent=true
          [Install]
          WantedBy=timers.target
      when: ansible_facts['hostname'] != "wsl-dev"

    - name: Enable Auto-Update Timer
      systemd:
        name: auto-sys-sync.timer
        enabled: yes
        state: started
      when: ansible_facts['hostname'] != "wsl-dev"

    # --- 3. PRIVILEGE & UPDATES ---
    - name: Allow 'pacman' to run without password
      lineinfile:
        path: /etc/sudoers.d/11-ansible-pacman
        line: "{{ user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: Update System Repos
      community.general.pacman:
        update_cache: yes
        upgrade: yes

    - name: Upgrade AUR Packages
      kewlfft.aur.aur:
        upgrade: yes
        use: paru
        aur_only: yes
      become: true
      become_user: "{{ user }}"

    # --- 4. CORE INSTALLATION ---
    - name: Install System Packages
      community.general.pacman:
        name: "{{ common_packages + (native_packages | default([])) + (host_packages | default([])) }}"
        state: present

    - name: Install AUR Packages
      kewlfft.aur.aur:
        name: "{{ common_aur_pkgs + (native_aur_pkgs | default([])) + (host_aur_pkgs | default([])) }}"
        use: paru
      become: true
      become_user: "{{ user }}"

    # --- 5. TOOLCHAINS & AI ---
    - name: Initialize Global Rust Toolchain
      shell: "rustup default stable"
      args:
        creates: "/home/{{ user }}/.cargo/bin/cargo"
      become: false

    - name: Initialize Elan (Lean 4)
      shell: "curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y"
      args:
        creates: "/home/{{ user }}/.elan/bin/lean"
      become: false
      ignore_errors: yes

    # --- 6. DETERMINISTIC DEV WORKFLOW (GHQ/FZF) ---
    - name: Ensure Dev Directory Structure Exists
      file:
        path: "/home/{{ user }}/{{ item }}"
        state: directory
        mode: '0755'
        owner: "{{ user }}"
        group: "{{ user }}"
      loop: "{{ dev_structure }}"
      become: true

    - name: Configure GHQ Root Directory in Git
      git_config:
        name: ghq.root
        scope: global
        value: "{{ ghq_root }}"
      become: false

    # --- 7. NATIVE CONFIGS (Groups/Services) ---
    - block:
        - name: Ensure Docker group exists
          group:
            name: docker
            state: present

        - name: Add User to Groups
          user:
            name: "{{ user }}"
            groups: docker,libvirt,gamemode,input,video
            append: yes

        - name: Enable Native Services
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
            daemon_reload: yes
          loop: "{{ native_services }}"
          ignore_errors: yes

        - name: Fix OwnCloud Scaling
          copy:
            dest: /home/{{ user }}/.local/share/applications/owncloud.desktop
            content: |
              [Desktop Entry]
              Name=ownCloud
              Exec=env QT_QPA_PLATFORM=xcb QT_QUICK_BACKEND=software /usr/bin/owncloud %F
              Icon=owncloud
              Type=Application
            mode: '0755'
            owner: "{{ user }}"
            group: "{{ user }}"
          become: false
      when: ansible_facts['hostname'] != "wsl-dev"

    # --- 8. MSI Z16 HARDWARE FIXES ---
    - block:
        - name: Create Audio Fix Script
          copy:
            dest: /usr/local/bin/msi-audio-fix.sh
            mode: '0755'
            content: |
              #!/bin/bash
              hda-verb /dev/snd/hwC0D0 0x17 SET_CONNECT_SEL 0x01
              hda-verb /dev/snd/hwC0D0 0x17 SET_PIN_WIDGET_CONTROL 0x40
              hda-verb /dev/snd/hwC0D0 0x1a SET_AMP_GAIN_MUTE 0xb000
              hda-verb /dev/snd/hwC0D0 0x1a SET_PIN_WIDGET_CONTROL 0x40

        - name: MSI Audio Service
          copy:
            dest: /etc/systemd/system/msi-audio.service
            content: |
              [Unit]
              Description=Fix MSI Woofers
              After=sound.target
              [Service]
              Type=oneshot
              ExecStart=/usr/local/bin/msi-audio-fix.sh
              [Install]
              WantedBy=multi-user.target

        - name: Add SteelSeries Udev Rule
          copy:
            dest: /etc/udev/rules.d/99-steelseries.rules
            content: |
              SUBSYSTEM=="usb", ATTRS{idVendor}=="1038", ATTRS{idProduct}=="1122", MODE="0666"
              SUBSYSTEM=="hidraw", ATTRS{idVendor}=="1038", MODE="0666"
          notify: Reload Udev

        - name: Enable EC Write Support (Fan Control)
          copy:
            dest: /etc/modprobe.d/msi-ec.conf
            content: "options ec_sys write_support=1"

        - name: Configure CachyOS Scheduler (LAVD)
          copy:
            dest: /etc/default/scx
            content: "SCX_SCHEDULER=scx_lavd"
          notify: Restart SCX

        - name: Enable MSI Services
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: [msi-audio.service, mcontrolcenter-helper.service]

      when: ansible_facts['hostname'] == "msi-z16"

  handlers:
    - name: Reload Udev
      shell: udevadm control --reload-rules && udevadm trigger
    - name: Restart SCX
      systemd:
        name: scx
        state: restarted
        daemon_reload: yes